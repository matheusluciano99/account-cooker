name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: format
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --all

  live-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: check every live target
        run: cargo clippy --workspace --all-targets --features live -- -D warnings
      - name: test live feature
        run: cargo test --workspace --features live
      - name: validate localnet proof script
        run: bash -n scripts/localnet-live-proof.sh

  stress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Heavy #[ignore] tests: the scale benchmark and the real SIGKILL crash-recovery proof.
      - name: scale + crash-recovery
        run: cargo test --all --release -- --ignored
